<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알고리즘실습 기말 예상문제 1~5회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#6d28d9;--accent2:#a78bfa;
  --ok:#10b981;--ok-bg:rgba(16,185,129,.13);--no:#ef4444;--no-bg:rgba(239,68,68,.13);
  --sel-bg:rgba(109,40,217,.13);--r:10px;--rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.75}
a{color:var(--accent2)}
/* ── Layout ── */
#app{max-width:780px;margin:0 auto;padding:2rem 1.25rem 5rem}
/* ── Header ── */
.hdr{text-align:center;padding:2.5rem 0 2rem}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:600;color:var(--accent2);letter-spacing:.04em;margin-bottom:.4rem}
.hdr p{font-size:.875rem;color:var(--muted)}
/* ── Round tabs ── */
.tabs{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:.6rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-size:.875rem;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .18s}
.tab:hover{border-color:var(--accent);color:var(--accent2)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* ── Progress ── */
.prog-wrap{margin-bottom:1.25rem}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;font-size:.8rem;color:var(--muted)}
.prog-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .3s ease}
.q-dots{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.7rem}
.q-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;font-family:'JetBrains Mono',monospace}
.q-dot:hover{border-color:var(--accent2);color:var(--accent2)}
.q-dot.current{border-color:var(--accent2);color:var(--accent2);background:var(--sel-bg)}
.q-dot.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.q-dot.wrong{background:var(--no-bg);border-color:var(--no);color:var(--no)}
/* ── Question card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;margin-bottom:1rem}
.q-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;background:var(--accent);color:#fff;padding:.25rem .6rem;border-radius:var(--rs)}
.q-topic{font-size:.8rem;color:var(--muted);background:var(--surface2);padding:.2rem .6rem;border-radius:var(--rs);border:1px solid var(--border)}
.q-body{font-size:.975rem;color:var(--text);margin-bottom:1.5rem}
.q-body table{border-collapse:collapse;margin:.75rem 0;font-size:.875rem;width:auto}
.q-body th,.q-body td{border:1px solid var(--border);padding:.35rem .7rem;text-align:left}
.q-body th{background:var(--surface2);color:var(--accent2);font-weight:600}
.q-body td:not(:first-child){text-align:right;font-family:'JetBrains Mono',monospace}
.q-body code{font-family:'JetBrains Mono',monospace;font-size:.875em;background:var(--surface2);padding:.15em .35em;border-radius:4px;color:var(--accent2)}
.q-body pre{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.9rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.83rem;color:var(--accent2);overflow-x:auto;margin:.6rem 0}
/* ── Options ── */
.opts{display:flex;flex-direction:column;gap:.6rem}
.opt{display:flex;align-items:flex-start;gap:.85rem;padding:.85rem 1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .17s;font-size:.925rem}
.opt:hover:not(.locked){border-color:var(--accent);background:var(--sel-bg)}
.opt.locked{cursor:default}
.opt-label{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.85rem;min-width:20px;color:var(--muted);padding-top:.05rem}
.opt.correct{border-color:var(--ok)!important;background:var(--ok-bg)!important}
.opt.correct .opt-label{color:var(--ok)}
.opt.wrong{border-color:var(--no)!important;background:var(--no-bg)!important}
.opt.wrong .opt-label{color:var(--no)}
.opt.selected-correct{border-color:var(--ok)!important;background:var(--ok-bg)!important}
/* ── Explanation ── */
.exp{display:none;margin-top:1rem;padding:1rem 1.1rem;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:var(--rs);font-size:.875rem;color:var(--text);line-height:1.8;animation:slideIn .2s ease}
.exp.show{display:block}
.exp-head{font-size:.75rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* ── Navigation ── */
.nav{display:flex;gap:.75rem;margin-top:1.25rem}
.btn{flex:1;padding:.75rem 1rem;border-radius:var(--rs);font-size:.9rem;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .17s;border:1.5px solid var(--border)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn:disabled{opacity:.3;cursor:default}
/* ── Score screen ── */
.score-wrap{display:none;text-align:center;padding:2rem 0}
.score-wrap.show{display:block}
.score-big{font-family:'JetBrains Mono',monospace;font-size:4rem;font-weight:600;color:var(--accent2);line-height:1}
.score-label{font-size:.95rem;color:var(--muted);margin:.6rem 0 2rem}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:1.5rem 0 2rem;text-align:center}
.score-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem .5rem;font-size:.8rem}
.score-item .n{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:600}
.score-item .l{color:var(--muted);font-size:.75rem;margin-top:.15rem}
.grade{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600;padding:.5rem 1.5rem;border-radius:var(--r);margin-bottom:.5rem}
/* ── Sheet (answer key) ── */
.sheet-toggle{display:flex;align-items:center;gap:.5rem;background:none;border:1px solid var(--border);color:var(--muted);padding:.55rem 1rem;border-radius:var(--rs);cursor:pointer;font-size:.8rem;font-family:'Noto Sans KR',sans-serif;margin:1.5rem 0 .75rem;width:100%;justify-content:center;transition:all .17s}
.sheet-toggle:hover{border-color:var(--accent2);color:var(--accent2)}
.sheet-wrap{display:none;overflow-x:auto}
.sheet-wrap.show{display:block}
.sheet-table{width:100%;border-collapse:collapse;font-size:.8rem;font-family:'JetBrains Mono',monospace}
.sheet-table th,.sheet-table td{border:1px solid var(--border);padding:.4rem .7rem;text-align:center}
.sheet-table th{background:var(--surface2);color:var(--accent2);font-weight:600}
.sheet-table td{color:var(--text)}
/* ── Misc ── */
.result-icon{display:inline-block;font-size:1.1rem;margin-left:.4rem}
@media(max-width:520px){
  .hdr h1{font-size:1rem}
  .card{padding:1.25rem}
  .score-grid{grid-template-columns:repeat(2,1fr)}
  .tab{font-size:.8rem;padding:.5rem .35rem}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1>📐 알고리즘실습 기말 예상문제</h1>
    <p>Lec.09–14 · 5회차 · 회차당 12문항 · 4지선다</p>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="quiz-view">
    <div class="prog-wrap">
      <div class="prog-row">
        <span id="prog-label">1 / 12</span>
        <span id="score-label" style="color:var(--ok);font-family:'JetBrains Mono',monospace;font-weight:600"></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="q-dots" id="q-dots"></div>
    </div>

    <div class="card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-topic" id="q-topic"></span>
      </div>
      <div class="q-body" id="q-body"></div>
      <div class="opts" id="opts"></div>
      <div class="exp" id="exp">
        <div class="exp-head">해설</div>
        <div id="exp-body"></div>
      </div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="move(-1)">← 이전</button>
      <button class="btn btn-primary" id="btn-next" onclick="move(1)">다음 →</button>
    </div>
  </div>

  <div class="score-wrap" id="score-wrap">
    <div class="grade" id="grade-badge"></div>
    <div class="score-big" id="score-big"></div>
    <div class="score-label" id="score-label2"></div>
    <div class="score-grid" id="score-grid"></div>
    <button class="btn btn-primary" style="max-width:200px;margin:0 auto" onclick="restartRound()">다시 풀기</button>
  </div>

  <button class="sheet-toggle" onclick="toggleSheet()">▾ 전체 정답표 보기</button>
  <div class="sheet-wrap" id="sheet-wrap">
    <table class="sheet-table">
      <thead><tr><th>회차</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th></tr></thead>
      <tbody id="sheet-body"></tbody>
    </table>
  </div>
</div>

<script>
const LABELS = ['A','B','C','D'];

// ════════════════════════════════════════════════
// QUESTION DATA  (5 rounds × 12 questions)
// ans: 0=A, 1=B, 2=C, 3=D
// ════════════════════════════════════════════════
const DATA = [

// ─── 제1회 ───────────────────────────────────────
[
{topic:"Scheduling with Deadlines",
q:`<p>다음 작업들이 주어졌다. 각 작업은 1단위 시간이 걸리며 deadline 이전 또는 시점에 완료해야 profit을 얻는다.</p>
<table><tr><th>Job</th><th>Deadline</th><th>Profit</th></tr>
<tr><td>J1</td><td>2</td><td>60</td></tr><tr><td>J2</td><td>1</td><td>100</td></tr>
<tr><td>J3</td><td>3</td><td>20</td></tr><tr><td>J4</td><td>2</td><td>40</td></tr>
<tr><td>J5</td><td>1</td><td>30</td></tr></table>
<p>profit 내림차순 greedy를 적용했을 때 최종 schedule과 총 profit으로 옳은 것은?</p>`,
opts:["[J2, J1, J3], 180","[J2, J4, J3], 160","[J1, J4, J3], 120","[J5, J1, J3], 110"],ans:0,
exp:"profit 내림차순: J2(100)→슬롯1 배치, J1(60)→슬롯2 배치, J4(40)→슬롯2 차 있고 슬롯1도 차서 제외, J5(30)→슬롯1 차서 제외, J3(20)→슬롯3 배치. 결과 [J2,J1,J3], 합계 100+60+20=180."},

{topic:"Huffman Code",
q:`<p>빈도 <code>5, 9, 12, 13, 16, 45</code>에 대해 Huffman algorithm을 수행한다. weighted external path length(WEPL)는?</p>`,
opts:["196","224","239","260"],ans:1,
exp:"결합 순서: 5+9=14 → 12+13=25 → 14+16=30 → 25+30=55 → 45+55=100. 각 잎의 (빈도×깊이): 45×1+12×3+13×3+16×3+5×4+9×4 = 45+36+39+48+20+36 = 224."},

{topic:"Knapsack Greedy",
q:`<p>배낭 용량 <code>W=20</code>, 물건 (weight, profit): <code>(10,60), (20,100), (30,120)</code>.</p>
<p>profit/weight 비율 기준 greedy를 적용할 때, <b>0-1 knapsack greedy</b> 결과와 <b>fractional knapsack</b> 결과로 옳은 것은?</p>`,
opts:["0-1: 60, fractional: 100","0-1: 60, fractional: 110","0-1: 100, fractional: 100","0-1: 100, fractional: 120"],ans:1,
exp:"비율: 6, 5, 4 순. 0-1 greedy: item1(w=10, p=60) 선택, 나머지 weight≥10이지만 용량 10만 남아 item2(w=20) 선택 불가 → 60. Fractional: item1 전부(60) + item2의 10/20 = 50 → 총 110."},

{topic:"n-Queens",
q:`<p>4-Queens에서 <code>col[1]=2, col[2]=4, col[3]=1</code>일 때 <code>col[4]=3</code>에 대한 설명으로 옳은 것은?</p>`,
opts:["같은 열 충돌이 있으므로 nonpromising이다.","대각선 충돌이 있으므로 nonpromising이다.","충돌이 없으므로 promising이다.","행 충돌이 있으므로 nonpromising이다."],ans:2,
exp:"col[4]=3 검사: vs col[1]=2 → 같은 열? 아니오, 대각선? |3-2|=1≠|4-1|=3 OK. vs col[2]=4 → |3-4|=1≠|4-2|=2 OK. vs col[3]=1 → |3-1|=2≠|4-3|=1 OK. 충돌 없음 → promising."},

{topic:"Sum-of-Subsets",
q:`<p><code>w=[2,4,6,9]</code>, 목표합 <code>W=11</code>. 현재 2는 포함하고 4는 제외했다.</p>
<p>현재 <code>weight</code>, 남은 원소 합 <code>total</code>, promising 여부로 옳은 것은?</p>`,
opts:["weight=2, total=15, promising","weight=2, total=10, nonpromising","weight=6, total=9, promising","weight=4, total=15, nonpromising"],ans:0,
exp:"2 포함 후 4 제외 → weight=2. 남은 원소 {6,9}의 합 total=15. 조건: weight≤W(2≤11)✓, weight+total≥W(2+15=17≥11)✓ → promising."},

{topic:"Graph Coloring",
q:`<p>간선: <code>(1,2),(1,3),(2,3),(3,4)</code>. 현재 <code>vcolor[1]=1, vcolor[2]=2</code>.</p>
<p><code>vcolor[3]</code>의 promising한 색은?</p>`,
opts:["색 1만 promising","색 2만 promising","색 3만 promising","색 1, 2, 3 모두 promising"],ans:2,
exp:"정점3은 정점1(색1)과 정점2(색2)에 인접. 따라서 색1, 색2는 모두 충돌. 색3은 인접 정점에 없으므로 promising. 색3만 가능."},

{topic:"Hamiltonian Circuit",
q:`<p>무방향 그래프 간선: <code>(1,2),(2,3),(3,4),(4,1),(1,3)</code>.</p>
<p>경로 후보 <code>[1,2,3,4]</code>에 대한 설명으로 옳은 것은?</p>`,
opts:["Hamiltonian circuit이다.","정점 3을 두 번 방문하므로 아니다.","간선 (4,1)이 없으므로 아니다.","모든 정점을 방문하지 않으므로 아니다."],ans:0,
exp:"경로 검사: (1→2)✓ (2→3)✓ (3→4)✓ (4→1)✓. 4개 정점 모두 정확히 한 번 방문 + 시작점 복귀 가능. Hamiltonian circuit 성립."},

{topic:"0-1 Knapsack DP",
q:`<p>배낭 용량 <code>W=5</code>, 물건 (weight, profit): <code>(2,3),(3,4),(4,5)</code>.</p>
<p>0-1 knapsack DP의 최적 profit은?</p>`,
opts:["5","7","8","9"],ans:1,
exp:"DP 계산: P[2][5]=max(P[1][5], 4+P[1][2])=max(3, 4+3)=7. P[3][5]=max(7, 5+P[2][1])=max(7,5)=7. 최적 profit = 7."},

{topic:"Branch-and-Bound Bound",
q:`<p><code>W=16</code>, 비율 순 정렬된 물건: <code>(2,40),(5,30),(10,50),(5,10)</code>.</p>
<p>item 1만 포함한 노드의 upper bound는?</p>`,
opts:["70","90","105","115"],ans:3,
exp:"item1 포함: profit=40, weight=2, 잔여용량=14. item2 전부(5,30): profit=70, weight=7, 잔여=9. item3은 weight=10>9 → 부분 포함: 50×(9/10)=45. bound=70+45=115."},

{topic:"TSP DP",
q:`<p><code>D[i][A]</code> = <code>vi</code>에서 출발해 집합 A의 정점을 모두 거쳐 <code>v1</code>로 돌아가는 최소 비용.</p>
<pre>D[i][A] = min( W[i][j] + _____ )  (vj ∈ A)</pre>
<p>빈칸에 들어갈 것은?</p>`,
opts:["D[i][A − {vj}]","D[j][A − {vj}]","D[j][A]","D[1][A − {vj}]"],ans:1,
exp:"vj로 이동한 뒤, vj에서 나머지 정점(A−{vj})을 거쳐 v1으로 돌아가는 비용은 D[j][A−{vj}]. 이것이 TSP DP의 핵심 점화식."},

{topic:"Selection Problem",
q:`<p>서로 다른 <b>63개</b>의 키가 있다.</p>
<p>(1) 최댓값만 찾는 최소 비교 횟수와 (2) 최솟값·최댓값을 동시에 찾는 pairing algorithm의 비교 횟수로 옳은 것은?</p>`,
opts:["62, 93","63, 94","62, 124","126, 93"],ans:0,
exp:"최댓값: n-1=62번. 동시 탐색(홀수n=63): 초기 원소를 min=max로 설정 후 31쌍 처리. 쌍당 3번 비교(쌍내 1 + max비교 1 + min비교 1) → 3×31=93."},

{topic:"NP Theory",
q:`<p>TSP decision problem, TSP optimization problem, <code>P ⊆ NP</code> 여부에 대한 설명으로 옳은 것은?</p>`,
opts:["decision: NP-hard, optimization: NP-complete, P⊆NP 거짓","decision: NP-complete, optimization: NP-hard, P⊆NP 참","decision: P, optimization: NP, P⊆NP 거짓","decision: NP-hard, optimization: P, P⊆NP 참"],ans:1,
exp:"TSP decision(\"비용≤k인 투어 존재?\"): NP이면서 NP-hard → NP-complete. TSP optimization: decision problem이 아니므로 NP에 속하지 않고 NP-hard. P⊆NP는 정의상 참(P문제는 NP 검증기로도 검증 가능)."}
],

// ─── 제2회 ───────────────────────────────────────
[
{topic:"Scheduling with Deadlines",
q:`<p>다음 작업들에 profit 내림차순 greedy를 적용한 결과로 옳은 것은?</p>
<table><tr><th>Job</th><th>Deadline</th><th>Profit</th></tr>
<tr><td>J1</td><td>3</td><td>40</td></tr><tr><td>J2</td><td>1</td><td>35</td></tr>
<tr><td>J3</td><td>1</td><td>30</td></tr><tr><td>J4</td><td>2</td><td>25</td></tr>
<tr><td>J5</td><td>3</td><td>20</td></tr></table>`,
opts:["[J2, J4, J1], 100","[J1, J2, J5], 95","[J3, J4, J1], 95","[J2, J3, J5], 85"],ans:0,
exp:"내림차순: J1(40)→슬롯3, J2(35)→슬롯1, J3(30)→슬롯1 차서 제외, J4(25)→슬롯2, J5(20)→슬롯3 차, 슬롯2·1도 차서 제외. 스케줄 [J2,J4,J1], profit=35+25+40=100."},

{topic:"Huffman Code",
q:`<p>빈도 <code>2, 3, 7, 9, 18</code>의 weighted external path length는?</p>`,
opts:["60","72","77","84"],ans:2,

exp:"최소화 문제에서 lower bound ≥ minlength이면, 이 노드의 어떤 자손도 현재 최적보다 나을 수 없으므로 pruning(가지치기)."},

{topic:"Second Largest",
q:`<p>서로 다른 <b>32개</b>의 키에서 tournament method로 두 번째로 큰 키를 찾을 때 필요한 비교 횟수는?</p>`,

{topic:"NP-hard vs NP-complete",
q:`<p>NP-hard와 NP-complete의 차이로 옳은 것은?</p>`,
opts:["NP-hard는 반드시 NP에 속한다.","NP-complete는 NP에 속하면서 NP-hard인 decision problem이다.","NP-complete는 항상 polynomial-time에 풀린다.","NP-hard는 항상 decision problem이다."],ans:1,
exp:"NP-complete = NP ∩ NP-hard (decision problems). NP-hard는 NP에 속하지 않을 수도 있다(예: Halting problem). NP-complete는 NP-hard이지만 다항시간 알고리즘은 아직 알려져 있지 않다."}
],

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let curRound = 0;
let curQ = 0;
let answers = Array.from({length:5}, ()=>Array(12).fill(null));

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function init(){
  // Build tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = ['제1회','제2회','제3회','제4회','제5회']
    .map((t,i)=>`<button class="tab${i===0?' active':''}" onclick="switchRound(${i})">${t}</button>`).join('');
  renderAll();
  renderSheet();
}

function switchRound(r){
  curRound = r;
  curQ = 0;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===r));
  document.getElementById('score-wrap').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  renderAll();
}

function renderAll(){
  renderDots();
  renderQuestion();
  renderNav();
}

function renderDots(){
  const qs = DATA[curRound];
  const dots = document.getElementById('q-dots');
  dots.innerHTML = qs.map((_,i)=>{
    const a = answers[curRound][i];
    let cls = i===curQ?'q-dot current':'q-dot';
    if(a!==null) cls+= a===qs[i].ans?' correct':' wrong';
    return `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`;
  }).join('');

  const answered = answers[curRound].filter(x=>x!==null).length;
  document.getElementById('prog-label').textContent = `${answered} / 12 완료`;
  document.getElementById('prog-fill').style.width = (answered/12*100)+'%';
  const correct = answers[curRound].filter((x,i)=>x===DATA[curRound][i].ans).length;
  document.getElementById('score-label').textContent = answered>0 ? `✓ ${correct}` : '';
}

function jumpTo(i){ curQ=i; renderAll(); }

function renderQuestion(){
  const qdata = DATA[curRound][curQ];
  document.getElementById('q-num').textContent = `Q${curQ+1}`;
  document.getElementById('q-topic').textContent = qdata.topic;
  document.getElementById('q-body').innerHTML = qdata.q;

  const sel = answers[curRound][curQ];
  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = qdata.opts.map((o,i)=>{
    let cls='opt';
    if(sel!==null){
      cls+=' locked';
      if(i===qdata.ans) cls+=' correct';
      else if(i===sel) cls+=' wrong';
    }
    return `<div class="${cls}" onclick="selectAns(${i})">
      <span class="opt-label">${LABELS[i]}</span>
      <span>${o}</span>
    </div>`;
  }).join('');

  const exp = document.getElementById('exp');
  const expBody = document.getElementById('exp-body');
  if(sel!==null){
    expBody.innerHTML = qdata.exp;
    exp.classList.add('show');
  } else {
    exp.classList.remove('show');
  }
}

function renderNav(){
  document.getElementById('btn-prev').disabled = curQ===0;
  const isLast = curQ===11;
  const allDone = answers[curRound].every(x=>x!==null);
  const btn = document.getElementById('btn-next');
  if(isLast && allDone){
    btn.textContent = '결과 보기 →';
    btn.onclick = showScore;
  } else {
    btn.textContent = '다음 →';
    btn.onclick = ()=>move(1);
    btn.disabled = isLast;
  }
}

function selectAns(i){
  if(answers[curRound][curQ]!==null) return;
  answers[curRound][curQ] = i;
  renderAll();
}

function move(dir){
  curQ = Math.max(0, Math.min(11, curQ+dir));
  renderAll();
}

function showScore(){
  const qv = document.getElementById('quiz-view');
  const sw = document.getElementById('score-wrap');
  qv.style.display='none';
  sw.classList.add('show');

  const qs = DATA[curRound];
  const correct = answers[curRound].filter((x,i)=>x===qs[i].ans).length;
  const pct = Math.round(correct/12*100);

  const grades = [{s:92,g:'A+',c:'#10b981'},{s:83,g:'A',c:'#10b981'},{s:75,g:'B+',c:'#6d28d9'},{s:67,g:'B',c:'#6d28d9'},{s:58,g:'C+',c:'#d97706'},{s:0,g:'C',c:'#ef4444'}];
  const {g,c} = grades.find(x=>pct>=x.s);

  const badge = document.getElementById('grade-badge');
  badge.textContent = g;
  badge.style.cssText = `background:${c}22;color:${c};border:1.5px solid ${c}`;

  document.getElementById('score-big').textContent = `${correct} / 12`;
  document.getElementById('score-label2').textContent = `정답률 ${pct}% · ${'제'+(curRound+1)+'회'}`;

  const grid = document.getElementById('score-grid');
  const cats = {
    '그리디/스케줄링':[0,1,2],
    '백트래킹':[3,4,5,6],
    'DP/B&B':[7,8,9],
    '복잡도이론':[10,11]
  };
  grid.innerHTML = Object.entries(cats).map(([label,idxs])=>{
    const ok = idxs.filter(i=>answers[curRound][i]===qs[i].ans).length;
    const col = ok===idxs.length?'#10b981':ok>0?'#6d28d9':'#ef4444';
    return `<div class="score-item"><div class="n" style="color:${col}">${ok}/${idxs.length}</div><div class="l">${label}</div></div>`;
  }).join('');
}

function restartRound(){
  answers[curRound] = Array(12).fill(null);
  curQ = 0;
  document.getElementById('score-wrap').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  renderAll();
}

function toggleSheet(){
  const s = document.getElementById('sheet-wrap');
  const btn = document.querySelector('.sheet-toggle');
  const showing = s.classList.toggle('show');
  btn.textContent = (showing?'▴':'▾') + ' 전체 정답표 보기';
}

function renderSheet(){
  const rounds=['제1회','제2회','제3회','제4회','제5회'];
  document.getElementById('sheet-body').innerHTML = rounds.map((r,ri)=>
    `<tr><td style="font-weight:600;color:var(--accent2)">${r}</td>`+
    DATA[ri].map(q=>`<td>${LABELS[q.ans]}</td>`).join('')+`</tr>`
  ).join('');
}

window.onload = init;
</script>
